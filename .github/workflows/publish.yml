name: Publish SEO Article

on:
  schedule:
    - cron: "0 9 1,11,21 * *"   # 3x per month
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    working-directory: seo-engine

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Run publisher
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
        run: npm run publish
      - name: Commit generated article + image
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add content/articles public/images/uploads seo-engine/data
            SLUG=$(git diff --cached --name-only content/articles | head -n1 | xargs -I{} basename {} .md)
            git commit -m "feat(blog): publish ${SLUG:-new article}"
            git push
          fi
