name: Publish SEO Article

on:
  schedule:
    - cron: "0 9 1,11,21 * *"   # 3x per month
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: yarn install --frozen-lockfile
      - name: Run publisher
        env:
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:              ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_WEBHOOK_URL:           ${{ secrets.SLACK_WEBHOOK_URL }}
          BLOG_REPO_OWNER:             ${{ secrets.BLOG_REPO_OWNER }}
          BLOG_REPO_NAME:              ${{ secrets.BLOG_REPO_NAME }}
          BLOG_REPO_TOKEN:             ${{ secrets.BLOG_REPO_TOKEN }}
          BLOG_REPO_BRANCH:            ${{ secrets.BLOG_REPO_BRANCH }}
        run: yarn run pub
      - name: Commit queue changes if any
        run: |
          git config user.name  "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data)" ]]; then
            git add data
            git commit -m "chore(seo): update article queue"
            git push
          fi
