name: Discover SEO Topics

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    working-directory: seo-engine

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Run discovery
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:             ${{ secrets.GOOGLE_SHEET_ID }}
        run: npm run discover
      - name: Commit fallback file if changed
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "seo-bot"
          git config user.email "seo-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain seo-engine/data/content-ideas.json)" ]]; then
            git add seo-engine/data/content-ideas.json
            git commit -m "chore(seo): refresh content ideas"
            git push
          fi
